<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clock Widget</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            color-scheme: light dark;

            --bg: #ffffff;
            --text: #333333;
            --mark-main: #000000;
            --mark-small: #666666;
            --second: #e74c3c;
            --shadow: rgba(0, 0, 0, 0.18);
            --second-shadow: rgba(231, 76, 60, 0.28);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #191919;
                --text: #f1f5f9;
                --mark-main: #f8fafc;
                --mark-small: #94a3b8;
                --second: #ff5a4f;
                --shadow: rgba(0, 0, 0, 0.45);
                --second-shadow: rgba(255, 90, 79, 0.35);
            }
        }

        body {
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            transition: background 0.25s ease, color 0.25s ease;
        }

        .clock {
            position: relative;
            width: 170px;
            height: 170px;
            border-radius: 50%;
        }

        .hour-marks {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        .mark {
            position: absolute;
            width: 0.6px;
            left: 50%;
            top: 2.8px;
            transform-origin: 50% 82.2px;
        }

        .mark.main {
            height: 14.2px;
            background: var(--mark-main);
        }

        .mark.small {
            height: 10.2px;
            background: var(--mark-small);
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: 50% 100%;
            background: var(--text);
            border-radius: 1px;
            filter: drop-shadow(0 0.54px 1.08px var(--shadow));
        }

        .hour-hand {
            width: 2.9px;
            height: 45.3px;
            margin-left: -1.45px;
        }

        .minute-hand {
            width: 1.75px;
            height: 62.4px;
            margin-left: -0.875px;
        }

        .second-hand-wrapper {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            transform-origin: 50% 50%;
        }

        .second-hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            width: 0.6px;
            height: 73.5px;
            margin-left: -0.3px;
            background: var(--second);
            transform-origin: 50% 100%;
            filter: drop-shadow(0 0.54px 1.08px var(--second-shadow));
        }

        .second-hand-tail {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0.6px;
            height: 17px;
            margin-left: -0.3px;
            background: var(--second);
        }

        .center-dot {
            position: absolute;
            width: 6.9px;
            height: 6.9px;
            background: var(--text);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            box-shadow: 0 0 0 1px var(--bg);
        }
    </style>
</head>
<body>
    <div class="clock">
        <div class="hour-marks"></div>
        <div class="hand hour-hand"></div>
        <div class="hand minute-hand"></div>
        <div class="second-hand-wrapper">
            <div class="hand second-hand"></div>
            <div class="second-hand-tail"></div>
        </div>
        <div class="center-dot"></div>
    </div>

    <script>
        function createClockMarks() {
            const hourMarks = document.querySelector(".hour-marks");

            for (let i = 0; i < 12; i++) {
                const mark = document.createElement("div");
                mark.classList.add("mark");
                mark.classList.add(i % 3 === 0 ? "main" : "small");
                mark.style.transform = `rotate(${i * 30}deg) translateX(-50%)`;
                hourMarks.appendChild(mark);
            }
        }

        function updateClock() {
            const now = new Date();

            const seconds = now.getSeconds();
            const minutes = now.getMinutes();
            const hours = now.getHours() % 12;

            const secondDeg = seconds * 6;
            const minuteDeg = minutes * 6 + seconds * 0.1;
            const hourDeg = hours * 30 + minutes * 0.5;

            document.querySelector(".second-hand-wrapper").style.transform = `rotate(${secondDeg}deg)`;
            document.querySelector(".minute-hand").style.transform = `rotate(${minuteDeg}deg)`;
            document.querySelector(".hour-hand").style.transform = `rotate(${hourDeg}deg)`;
        }

        createClockMarks();
        updateClock();
        setInterval(updateClock, 100);
    </script>
</body>
</html>
